name: Enable auto-merge on Copilot PRs

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: startsWith(github.event.pull_request.head.ref, 'copilot/') && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge \
            --auto \
            --squash \
            --repo "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}"
